services:
  - type: web
    name: explaindroid
    env: docker
    plan: starter
    healthCheckPath: /health
    disk:
      name: explaindroid-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: EXPLAINDROID_DATA_DIR
        value: /data
      - key: EXPLAINDROID_MAX_WORKERS
        value: "1"
      - key: EXPLAINDROID_MAX_UPLOAD_MB
        value: "100"
      - key: ANDROID_PLATFORMS
        value: /opt/android-sdk/platforms
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false
      - key: EXPLAINDROID_USERNAME
        value: explaindroid
      - key: EXPLAINDROID_PASSWORD
        sync: false
