services:
  - type: web
    name: explaindroid
    runtime: docker
    plan: free
    dockerCommand: python -m explaindroid.app
    healthCheckPath: /health
    envVars:
      - key: EXPLAINDROID_DATA_DIR
        value: /data
      - key: EXPLAINDROID_MAX_UPLOAD_MB
        value: "100"
      - key: EXPLAINDROID_ANALYSIS_TIMEOUT_SECONDS
        value: "600"
      - key: EXPLAINDROID_JAVA_MAX_HEAP_MB
        value: "384"
      - key: EXPLAINDROID_PROCESS_MULTIPLE_DEX
        value: "0"
      - key: EXPLAINDROID_LENIENT_PARSING
        value: "1"
      - key: EXPLAINDROID_FLOWDROID_EXTRA_ARGS
        value: ""
      - key: EXPLAINDROID_FLOWDROID_FALLBACK_ARGS
        value: "-ot -nc"
      - key: ANDROID_PLATFORMS
        value: /opt/android-sdk/platforms
      - key: JAVA_BIN
        value: java
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        fromDatabase:
          name: explaindroid-db
          property: connectionString
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_API_KEY
        sync: false
      - key: EXPLAINDROID_S3_BUCKET
        sync: false
      - key: EXPLAINDROID_S3_ENDPOINT_URL
        sync: false
      - key: EXPLAINDROID_S3_REGION
        value: auto
      - key: EXPLAINDROID_S3_ACCESS_KEY_ID
        sync: false
      - key: EXPLAINDROID_S3_SECRET_ACCESS_KEY
        sync: false

databases:
  - name: explaindroid-db
    plan: free
